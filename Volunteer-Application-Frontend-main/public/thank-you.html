<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Application Submitted</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7fafc;
        color: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .page {
        max-width: 650px;
        margin: 24px;
        padding: 32px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
        color: #0f172a;
      }
      p {
        line-height: 1.7;
      }
      .button {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 24px;
        border: none;
        border-radius: 999px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Thank you!</h1>
      <p>
        Your application has been submitted successfully. We appreciate your interest and will review your information shortly.
      </p>
      <p>
        If you want to apply for another role or return to the homepage, click below.
      </p>
      <a class="button" href="/">Return to Home</a>
    </main>
  </body>
</html>
